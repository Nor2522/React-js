<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chat App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../src/react.development.js"></script>
    <script src="../src/react-dom.development.js"></script>
    <script src="../src/babel.min.js"></script>
    <style>
      body {
        background-color: rgba(0, 0, 17, 0.733);
        color: #fff;
      }
    </style>
  </head>

  <body>
    <div class="container"></div>
    <script type="text/babel">
      const containerEL = document.querySelector(".container");
      const root = ReactDOM.createRoot(containerEL);

      //  creating components

      function ChatInput() {
        return (
          <>
            <input 
              type="text"
              placeholder="Send a message to the Chatbot"
              size="30"
            />
            <button>Send</button>
          </>
        );
      }

      function ChatMessage() {
        return (
          <div>
            {" "}
            hello Chatbot <img src="user-solid-full.svg" alt="" width="50" />
          </div>
        );
      }

      // displayer App

      const app = (
        <>
          <ChatInput />
          <ChatMessage />
        </>
      );

      root.render(app);
    </script>
  </body>
</html>
